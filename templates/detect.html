<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detect Fake News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background: linear-gradient(135deg,#1d2671,#c33764);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* Navbar */

nav{
background:rgba(0,0,0,0.3);
display:flex;
justify-content:center;
padding:15px 0;
backdrop-filter:blur(10px);
}

nav .nav-link{
color:white;
margin:0 25px;
font-weight:500;
text-decoration:none;
transition:0.3s;
}

nav .nav-link:hover{
color:#00e0ff;
}

/* Detect Section */

.detect-section{
display:flex;
justify-content:center;
align-items:center;
padding:100px 20px;
}

.detect-card{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:100%;
max-width:700px;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
text-align:center;
animation:fadeInUp 1s ease;
}

.detect-card h2{
font-weight:700;
margin-bottom:15px;
color:#00e0ff;
}

.detect-card p{
color:#ddd;
margin-bottom:25px;
}

/* textarea */

textarea{

width:100%;
height:180px;
border-radius:12px;
border:none;
padding:15px;
resize:none;
outline:none;
font-size:15px;
}

/* button */

.detect-btn{

margin-top:20px;
background:#00e0ff;
border:none;
color:black;
font-weight:600;
padding:12px 30px;
border-radius:30px;
transition:0.3s;
}

.detect-btn:hover{
background:#00b4cc;
transform:scale(1.05);
}

/* animation */

@keyframes fadeInUp{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* footer */

footer.site-footer{

background:rgba(0,0,0,0.5);
padding:30px 0;
text-align:center;
backdrop-filter:blur(10px);
}

footer .footer-content h3{

font-weight:600;
font-size:1.5rem;
margin-bottom:10px;
color:#00e0ff;
}

footer .footer-links{

list-style:none;
display:flex;
justify-content:center;
margin:15px 0;
padding:0;
}

footer .footer-links li{
margin:0 15px;
}

footer .footer-links a{

text-decoration:none;
color:white;
transition:0.3s;
}

footer .footer-links a:hover{
color:#00e0ff;
}

.footer-credit{

font-size:0.9rem;
color:#ccc;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav>

<a href="/user_home/" class="nav-link">Home</a>
    <a href="/detect/" class="nav-link">Detect News</a>
<a href="/history/" class="nav-link">History</a>
<a href="/user_logout/" class="nav-link">Logout</a>

</nav>


<!-- Detect Section -->

<section class="detect-section">

<div class="detect-card">


<h2>Fake News Detection</h2>

<p>Paste any news article or headline below to check whether it is real or fake using our machine learning model.</p>

<form method="POST">

{% csrf_token %}

<textarea name="news_text" placeholder="Paste news content here..." required></textarea>

<br>

<button type="submit" class="detect-btn">Check News</button>

</form>

</div>

</section>


<!-- Footer -->

<footer class="site-footer">

<div class="footer-content">

<h3>Fake News Detection System</h3>

<ul class="footer-links">

<li><a href="/user_home/">Home</a></li>
<li><a href="/user_logout/">Logout</a></li>

</ul>

<p class="footer-credit">© 2025 Fake News Detection System. All rights reserved.</p>

</div>

</footer>


<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script>

{% for message in messages %}

swal("{{message}}");

{% endfor %}

</script>

</body>
</html>
