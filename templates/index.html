<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake News Detection System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1d2671, #c33764);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    nav {
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      padding: 15px 0;
      backdrop-filter: blur(10px);
    }

    nav .nav-link {
      color: white;
      margin: 0 25px;
      font-weight: 500;
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    nav .nav-link:hover {
      color: #00e0ff;
    }

    .home-section {
      position: relative;
      text-align: center;
      padding: 140px 20px;
      background: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1500&q=80') no-repeat center center/cover;
      border-radius: 20px;
      margin: 40px auto;
      width: 90%;
      max-width: 1200px;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .home-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .home-section h1 {
      position: relative;
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      z-index: 1;
      animation: fadeInDown 1.2s ease-out;
    }

    .home-section p {
      position: relative;
      z-index: 1;
      color: #f0f0f0;
      max-width: 700px;
      margin: 20px auto 0;
      font-size: 1.1rem;
      animation: fadeInUp 1.2s ease-out;
    }

    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .detect-btn {
      position: relative;
      z-index: 1;
      margin-top: 30px;
      background-color: #00e0ff;
      border: none;
      color: black;
      font-weight: 600;
      padding: 12px 30px;
      border-radius: 30px;
      transition: 0.3s;
    }

    .detect-btn:hover {
      background-color: #00b4cc;
      transform: scale(1.05);
    }

    footer.site-footer {
      background: rgba(0, 0, 0, 0.5);
      padding: 30px 0;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    footer .footer-content h3 {
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #00e0ff;
    }

    footer .footer-links {
      list-style: none;
      display: flex;
      justify-content: center;
      margin: 15px 0;
      padding: 0;
    }

    footer .footer-links li {
      margin: 0 15px;
    }

    footer .footer-links a {
      text-decoration: none;
      color: white;
      transition: color 0.3s ease;
    }

    footer .footer-links a:hover {
      color: #00e0ff;
    }

    .footer-credit {
      font-size: 0.9rem;
      color: #ccc;
    }
  </style>
</head>

<body>

  <!-- 🌐 Navigation Bar -->
  <nav>
    <a href="/" class="nav-link">Home</a>
    <a href="/about/" class="nav-link">About</a>
     <a href="/user_login/" class="nav-link">User</a>
 
    <a href="/admin_login/" class="nav-link">Admin</a>
  </nav>

  <!-- 📰 Home Section -->
  <section id="home" class="home-section">
    <h1>Fake News Detection System</h1>
    <p>Empowering readers to verify truth — detect fake news using machine learning and NLP intelligence.</p>
    <a href="/user_login/">
      <button class="detect-btn">Try Now</button>
    </a>
  </section>

  <!-- 🌍 Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <h3>Fake News Detection System</h3>

      <ul class="footer-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/user_login/">User</a></li>
        <li><a href="/admin_login/">Admin</a></li>
      </ul>

      <p class="footer-credit">© 2025 Fake News Detection System. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script>
      {% for message in messages %}
      swal("{{message}}");
      {% endfor %}
  </script>

</body>
</html>
