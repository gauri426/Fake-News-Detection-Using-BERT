<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | AI Mock Interview System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #2b5876, #4e4376);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    nav {
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      padding: 15px 0;
      backdrop-filter: blur(10px);
    }

    nav .nav-link {
      color: white;
      margin: 0 25px;
      font-weight: 500;
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    nav .nav-link:hover {
      color: #ffd369;
    }

    .auth-section {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      padding: 60px 20px;
    }

    .auth-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 50px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .auth-container h3 {
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 1.8rem;
      color: #ffd369;
    }

    .auth-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 1rem;
      color: #333;
      outline: none;
    }

    .auth-container button {
      width: 100%;
      background: #ffd369;
      color: #222;
      border: none;
      padding: 12px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .auth-container button:hover {
      background: #ffca2c;
      transform: translateY(-2px);
    }

    .auth-container a {
      color: #ffd369;
      text-decoration: none;
    }

    footer.site-footer {
      background: rgba(0, 0, 0, 0.5);
      padding: 25px 0;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    footer .footer-content h3 {
      font-weight: 600;
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: #ffd369;
    }

    footer .footer-links {
      list-style: none;
      display: flex;
      justify-content: center;
      margin: 10px 0;
      padding: 0;
    }

    footer .footer-links li {
      margin: 0 15px;
    }

    footer .footer-links a {
      text-decoration: none;
      color: white;
      transition: color 0.3s ease;
    }

    footer .footer-links a:hover {
      color: #ffd369;
    }

    .footer-credit {
      font-size: 0.85rem;
      color: #ccc;
    }
  </style>
</head>

<body>

  <!-- 🌐 Navigation Bar -->
  <nav>
    <a href="/" class="nav-link">Home</a>
    <a href="/admin_registration/" class="nav-link">Admin Signup</a>
  </nav>

  <!-- 🧾 Admin Login Section -->
  <section id="admin-login" class="auth-section">
    <div class="auth-container">
      <h3>Admin Login</h3>
      <form method="POST">
        {% csrf_token %}
        <input type="text" name="admin_username" placeholder="Admin Username or Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p class="mt-3">
          Don’t have an account?
          <a href="/admin_registration/">Register here</a>
        </p>
      </form>
    </div>
  </section>

  <!-- 🌍 Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <h3>AI Mock Interview System</h3>
      <p>Bridging Silence, Connecting Worlds.</p>

      <ul class="footer-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/user_login/">Login</a></li>
        <li><a href="/user_registration/">Signup</a></li>
        <li><a href="/admin_login/">Admin</a></li>
      </ul>

      <p class="footer-credit">© 2025 AI Mock Interview System. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script>
      {% for message in messages %}
      swal("{{message}}");
      {% endfor %}
  </script>

</body>
</html>
