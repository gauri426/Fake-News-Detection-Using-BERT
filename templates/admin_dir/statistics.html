{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Admin Statistics</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
        background:linear-gradient(135deg,#1d2671,#c33764);
        font-family:Poppins;
        color:white;
        min-height:100vh;
        }

        /* navbar */

        .navbar{
        background:rgba(0,0,0,0.4);
        backdrop-filter:blur(10px);
        }
        .navbar-brand{
        color:#00e0ff !important;
        font-weight:400;
        }

        .nav-tab{
        color:white;
        text-decoration:none;
        margin-left:20px;
        font-weight:400;   /* remove bold */
        transition:0.3s;
        }

        .nav-tab:hover{
        color:#00e0ff;
        }

        /* stats cards */

        .stat-box{
        background:rgba(255,255,255,0.12);
        border-radius:15px;
        padding:25px;
        text-align:center;
        backdrop-filter:blur(12px);
        }

        .stat-box h3{
        color:#00e0ff;
        }

        /* chart container */

        .chart-box{
        background:rgba(255,255,255,0.12);
        border-radius:20px;
        padding:30px;
        margin-top:40px;
        backdrop-filter:blur(12px);
        }

    </style>

</head>

<body>

<nav class="navbar fixed-top navbar-dark">

    <div class="container">

        <a class="navbar-brand text-info">Fake News Admin</a>

        <div>

            <a href="/admin_home/" class="nav-tab">Dashboard</a>
            <a href="/view_user/" class="nav-tab">Users</a>
            <a href="/news_history/" class="nav-tab">History</a>
            <a href="/admin_logout/" class="nav-tab">Logout</a>

        </div>

    </div>

</nav>


<!-- STATISTICS CARDS -->

<div class="container" style="margin-top:120px">

    <div class="row text-center">

        <div class="col-md-3">

            <div class="stat-box">

                <h3>{{total_users}}</h3>

                <p>Total Users</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stat-box">

                <h3>{{total_news}}</h3>

                <p>Total News Checked</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stat-box">

                <h3>{{fake_news}}</h3>

                <p>Fake News</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stat-box">

                <h3>{{real_news}}</h3>

                <p>Real News</p>

            </div>

        </div>

    </div>

</div>


<!-- PIE CHART -->

<div class="container">

    <div class="chart-box">

        <h4 class="text-center mb-4">Fake vs Real News</h4>

        <canvas id="pieChart"></canvas>

    </div>

</div>


<!-- LINE CHART -->

<div class="container">

    <div class="chart-box">

        <h4 class="text-center mb-4">Daily Predictions</h4>

        <canvas id="lineChart"></canvas>

    </div>

</div>


<script>

    const fakeNews = {{fake_news}};
    const realNews = {{real_news}};

    const pieCtx = document.getElementById('pieChart');

    new Chart(pieCtx, {

    type: 'pie',

    data: {

    labels: ['Fake News','Real News'],

    datasets: [{

    data: [fakeNews, realNews],

    backgroundColor: ['#ff4c4c','#00ff9d']

    }]

    }

    });



    const dates = {{dates|safe}};
    const counts = {{counts|safe}};

    const lineCtx = document.getElementById('lineChart');

    new Chart(lineCtx, {

    type: 'line',

    data: {

    labels: dates,

    datasets: [{

    label: 'Predictions',

    data: counts,

    borderColor: '#00e0ff',

    backgroundColor: 'rgba(0,224,255,0.2)',

    fill: true

    }]

    }

    });

</script>

</body>
</html>
