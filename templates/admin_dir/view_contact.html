
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .graph-container {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 30px;
      margin-top: 40px;
    }
    .graph-box {
      background: white;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
      width: 45%;
      min-width: 300px;
      text-align: center;
    }
    .dashboard-header {
      margin-top: 30px;
    }

    .dashboard-boxes {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    margin: 40px auto;
    max-width: 1200px;
    gap: 20px;
  }

  .dashboard-box {
    flex: 1 1 calc(25% - 20px);
    color: black;
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    font-size: 1.2rem;
  }
  </style>
</head>
<body>

<!-- Notification Script -->
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
<script>
    {% for message in messages %}
    swal("{{message}}");
    {% endfor %}
</script>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Admin Pannel</a>
    <div class="ms-auto d-flex align-items-center">
      <a href="/admin_home/" class="btn btn-outline-light me-3">Home</a>

      <a href="/view_user/" class="btn btn-outline-light me-3">View Users</a>
      
      <a href="/admin_logout/" class="btn btn-outline-light">Logout</a>

    </div>
  </div>
</nav>

<!-- Dashboard Content -->
<div class="container dashboard-header text-center">
  <h1 class="mt-4">All Users Contact informations</h1>
  <p class="lead">Here is the list of all users, You can manage Contacts.</p>
</div>


    <div class="container my-5" style="border: 5px solid;">
    <table class="table table-hover ">

        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col"> Username</th>
           
        
            <th scope="col">Email</th>
             <th scope="col">Phone no</th>
            <th scope="col">Descriptions</th>
           
          </tr>
        </thead>
        <tbody>
          {% for fm in forms  %}
            <th scope="row">{{forloop.counter}}</th>
            <td colspan="">{{fm.name}}</td>
            <td colspan="">{{fm.email}}</td>
            <td colspan="">{{fm.phone}}</td>
            <td colspan="">{{fm.desc}}</td>
           
          
        </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
